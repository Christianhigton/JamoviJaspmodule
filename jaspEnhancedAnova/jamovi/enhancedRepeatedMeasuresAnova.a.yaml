---
name: enhancedRepeatedMeasuresAnova
title: JASP Enhanced Repeated Measures ANOVA
menuGroup: JASP Enhanced ANOVA
menuTitle: Repeated Measures ANOVA
version: '0.1.0'
jas: '1.2'
description:
    main: >
        Repeated Measures ANOVA matching the JASP RM ANOVA analysis, including
        multi-factor within-subject designs, sphericity corrections, post hoc tests,
        contrasts, plots, marginal means, simple effects, nonparametric alternatives,
        order-restricted hypotheses, and Bayesian model comparison.
options:
    - { name: data, type: Data }

    # Repeated measures design specification
    # rmFactorSpec: "FactorA:Level1,Level2;FactorB:L1,L2,L3"  (our jamovi string encoding of JASP FactorLevelList)
    - { name: rmFactorSpec,         title: Repeated Measures Factor Specification, type: String, default: '' }
    - { name: rmFactorNames,        title: Repeated Measures Factor Name,           type: String, default: 'RM Factor 1' }
    - { name: rmFactorLevels,       title: Repeated Measures Factor Levels,         type: String, default: 'Level 1, Level 2' }
    - { name: repeatedMeasuresCells,title: Repeated Measures Cells,                 type: Variables, suggested: [continuous], permitted: [numeric] }
    - { name: betweenSubjectFactors,title: Between Subject Factors,                 type: Variables, suggested: [nominal, ordinal], permitted: [factor] }
    - { name: covariates,           title: Covariates,                              type: Variables, suggested: [continuous], permitted: [numeric] }

    # Display
    - { name: descriptives,                   title: Descriptive statistics,          type: Bool, default: false }
    - { name: effectSizeEstimates,             title: Estimates of effect size,        type: Bool, default: false }
    - { name: effectSizeOmegaSquared,          title: "ω²",                            type: Bool, default: true  }
    - { name: effectSizePartialOmegaSquared,   title: "partial ω²",                    type: Bool, default: false }
    - { name: effectSizeEtaSquared,            title: "η²",                            type: Bool, default: false }
    - { name: effectSizePartialEtaSquared,     title: "partial η²",                    type: Bool, default: false }
    - { name: effectSizeGeneralEtaSquared,     title: "general η²",                    type: Bool, default: false }
    - { name: effectSizeCi,                    title: Confidence intervals,             type: Bool, default: false }
    - { name: effectSizeCiLevel,               title: CI level,                        type: Number, min: 50, max: 99.9, default: 95 }
    - { name: vovkSellke,                      title: Vovk-Sellke maximum p-ratio,     type: Bool, default: false }

    # Model
    - name: sumOfSquares
      title: Sum of squares
      type: List
      options:
        - { name: type1, title: "Type Ⅰ" }
        - { name: type2, title: "Type Ⅱ" }
        - { name: type3, title: "Type Ⅲ" }
      default: type3
    - { name: poolErrorTermFollowup, title: Pool error term for follow-up tests, type: Bool, default: false }

    # Assumption Checks
    - { name: sphericityTests,                         title: Sphericity tests,          type: Bool, default: true  }
    - { name: sphericityCorrectionNone,                title: None,                      type: Bool, default: true  }
    - { name: sphericityCorrectionGreenhouseGeisser,   title: Greenhouse-Geisser,        type: Bool, default: false }
    - { name: sphericityCorrectionHuynhFeldt,          title: Huynh-Feldt,               type: Bool, default: false }
    - { name: homogeneityTests,                        title: Homogeneity tests,         type: Bool, default: false }
    - { name: qqPlot,                                  title: Q-Q plot residuals,        type: Bool, default: false }
    - { name: qqPlotCi,                                title: Confidence interval,       type: Bool, default: false }
    - { name: qqPlotCiLevel,                           title: CI level,                  type: Number, min: 50, max: 99.9, default: 95 }

    # Contrasts
    - name: contrastType
      title: Contrast type
      type: List
      options:
        - { name: none,       title: None       }
        - { name: deviation,  title: Deviation  }
        - { name: simple,     title: Simple     }
        - { name: difference, title: Difference }
        - { name: helmert,    title: Helmert    }
        - { name: repeated,   title: Repeated   }
        - { name: polynomial, title: Polynomial }
      default: none
    - { name: contrastCi,         title: Confidence intervals,       type: Bool,   default: true  }
    - { name: contrastCiLevel,    title: CI level,                   type: Number, min: 50, max: 99.9, default: 95 }
    - { name: contrastEffectSize, title: "Effect size (Cohen's d)",  type: Bool,   default: false }

    # Order Restricted Hypotheses
    - { name: restrictedSyntax,                              title: Hypothesis syntax,           type: String, default: '' }
    - { name: restrictedInterceptInclusion,                  title: Include intercept,           type: Bool, default: false }
    - { name: restrictedAvailableCoefficients,               title: Show available coefficients, type: Bool, default: false }
    - { name: restrictedModelSummaryForAllModels,            title: Model summary,               type: Bool, default: false }
    - { name: restrictedMarginalMeanForAllModels,            title: Marginal means,              type: Bool, default: false }
    - name: restrictedModelComparison
      title: Add to comparison
      type: List
      options:
        - { name: complement,    title: Complement model    }
        - { name: unconstrained, title: Unconstrained model }
        - { name: none,          title: None                }
      default: complement
    - { name: restrictedModelComparisonWeights,          title: Add weight ratios,             type: Bool, default: true  }
    - name: restrictedModelComparisonReference
      title: Reference model
      type: List
      options:
        - { name: complement,    title: Complement model    }
        - { name: unconstrained, title: Unconstrained model }
      default: complement
    - { name: restrictedModelComparisonMatrix,               title: Relative weights matrix,     type: Bool, default: false }
    - { name: restrictedModelComparisonCoefficients,         title: Compare model coefficients,  type: Bool, default: false }
    - { name: restrictedModelComparisonCoefficientsHighlight,title: Highlight active restrictions,type: Bool, default: true }
    - name: restrictedHeterogeneityCorrection
      title: Heterogeneity correction
      type: List
      options:
        - { name: none,         title: None  }
        - { name: huberWhite0,  title: HC0   }
        - { name: huberWhite1,  title: HC1   }
        - { name: huberWhite2,  title: HC2   }
        - { name: huberWhite3,  title: HC3   }
        - { name: huberWhite4,  title: HC4   }
        - { name: huberWhite4m, title: HC4m  }
        - { name: huberWhite5,  title: HC5   }
      default: none
    - { name: restrictedBootstrap,        title: Bootstrapping,        type: Bool,    default: false }
    - { name: restrictedBootstrapSamples, title: Samples,              type: Integer, min: 100, max: 100000, default: 1000 }
    - { name: restrictedBootstrapCiLevel, title: Confidence intervals, type: Number,  min: 50, max: 99.9, default: 95 }
    - { name: restrictedMarginalMeanTerms, title: Restricted marginal mean terms, type: Variables, suggested: [nominal, ordinal], permitted: [factor] }

    # Post Hoc Tests
    - { name: postHocTerms,            title: Post hoc terms,                           type: Variables, suggested: [nominal, ordinal], permitted: [factor] }
    - { name: postHocEffectSize,       title: Effect size,                              type: Bool, default: false }
    - { name: postHocConditionalTable, title: Conditional comparisons for interactions, type: Bool, default: false }
    - { name: postHocCorrectionHolm,       title: Holm,                      type: Bool, default: true  }
    - { name: postHocCorrectionBonferroni, title: Bonferroni,                type: Bool, default: false }
    - { name: postHocCorrectionTukey,      title: Tukey,                     type: Bool, default: false }
    - { name: postHocCorrectionScheffe,    title: "Scheffé",            type: Bool, default: false }
    - { name: postHocCorrectionFdr,        title: FDR (Benjamini-Hochberg), type: Bool, default: false }
    - { name: postHocCi,               title: Confidence intervals,          type: Bool,   default: true  }
    - { name: postHocCiLevel,          title: CI level,                      type: Number, min: 50, max: 99.9, default: 95 }
    - { name: postHocSignificanceFlag, title: Flag significant comparisons,  type: Bool, default: false }
    - { name: postHocLetterTable,      title: Letter-based grouping table,   type: Bool, default: false }
    - { name: postHocLetterAlpha,      title: Alpha level,                   type: Number, min: 0, max: 1, default: 0.05 }

    # Descriptive Plots
    - { name: descriptivePlotHorizontalAxis,    title: Horizontal Axis,  type: Variable, suggested: [nominal, ordinal], permitted: [factor] }
    - { name: descriptivePlotSeparateLines,     title: Separate Lines,   type: Variable, suggested: [nominal, ordinal], permitted: [factor] }
    - { name: descriptivePlotSeparatePlot,      title: Separate Plots,   type: Variable, suggested: [nominal, ordinal], permitted: [factor] }
    - { name: descriptivePlotErrorBar,          title: Error bars,       type: Bool, default: true }
    - name: descriptivePlotErrorBarType
      title: Error bar type
      type: List
      options:
        - { name: ci, title: Confidence interval }
        - { name: se, title: Standard error      }
      default: ci
    - { name: descriptivePlotCiLevel,           title: CI level,         type: Number, min: 50, max: 99.9, default: 95 }
    - { name: descriptivePlotYAxisLabel,        title: Label y-axis,     type: String, default: '' }
    - { name: descriptivePlotErrorBarPooled,    title: Average across unused RM factors, type: Bool, default: false }
    - { name: normalizeErrorBarsDescriptives,   title: Normalize error bars, type: Bool, default: true }

    # Bar Plots
    - { name: barPlotHorizontalAxis,    title: Horizontal Axis,          type: Variable, suggested: [nominal, ordinal], permitted: [factor] }
    - { name: barPlotSeparatePlots,     title: Separate Plots,           type: Variable, suggested: [nominal, ordinal], permitted: [factor] }
    - { name: barPlotErrorBars,         title: Error bars,               type: Bool, default: true  }
    - name: barPlotErrorBarType
      title: Error bar type
      type: List
      options:
        - { name: ci, title: Confidence interval }
        - { name: se, title: Standard error      }
      default: ci
    - { name: barPlotCiInterval,        title: CI level,                 type: Number, min: 50, max: 99.9, default: 95 }
    - { name: barPlotHorizontalZeroFix, title: Fix horizontal axis to 0, type: Bool, default: true  }
    - { name: labelYAxisTwo,            title: Label y-axis,             type: String, default: '' }
    - { name: usePooledStandErrorCITwo, title: Average across unused RM factors, type: Bool, default: false }
    - { name: normalizeErrorBarsBarplot,title: Normalize error bars,     type: Bool, default: true  }

    # Raincloud Plots
    - { name: rainCloudHorizontalAxis,  title: Horizontal Axis,    type: Variable, suggested: [nominal, ordinal], permitted: [factor] }
    - { name: rainCloudSeparatePlots,   title: Separate Plots,     type: Variable, suggested: [nominal, ordinal], permitted: [factor] }
    - { name: rainCloudYAxisLabel,      title: Label y-axis,       type: String, default: '' }

    # Marginal Means
    - { name: marginalMeanTerms,            title: Marginal means terms,          type: Variables, suggested: [nominal, ordinal], permitted: [factor] }
    - { name: marginalMeanBootstrap,        title: From bootstraps,               type: Bool,    default: false }
    - { name: marginalMeanBootstrapSamples, title: Bootstrap samples,             type: Integer, min: 100, max: 100000, default: 1000 }
    - { name: marginalMeanComparedToZero,   title: Compare marginal means to 0,  type: Bool,    default: false }
    - name: marginalMeanCiCorrection
      title: Confidence interval adjustment
      type: List
      options:
        - { name: none,       title: None       }
        - { name: bonferroni, title: Bonferroni }
        - { name: sidak,      title: "Šidák" }
      default: none

    # Simple Main Effects
    - { name: simpleMainEffectFactor,             title: Simple Effect Factor, type: Variable, suggested: [nominal, ordinal], permitted: [factor] }
    - { name: simpleMainEffectModeratorFactorOne, title: Moderator Factor 1,  type: Variable, suggested: [nominal, ordinal], permitted: [factor] }
    - { name: simpleMainEffectModeratorFactorTwo, title: Moderator Factor 2,  type: Variable, suggested: [nominal, ordinal], permitted: [factor] }
    - { name: simpleMainEffectErrorTermPooled,    title: Pool error terms,    type: Bool, default: false }

    # Nonparametrics (Friedman / Durbin)
    - { name: friedmanWithinFactor,  title: RM Factor,                type: Variable, suggested: [nominal, ordinal], permitted: [factor] }
    - { name: friedmanBetweenFactor, title: Optional Grouping Factor, type: Variable, suggested: [nominal, ordinal], permitted: [factor] }
    - { name: conoverTest,           title: "Conover's post hoc tests", type: Bool, default: false }

    # Export
    - { name: residualsSavedToData,       title: Append residuals to data,   type: Bool,   default: false }
    - { name: residualsSavedToDataColumn, title: Column name,                type: String, default: 'residuals'   }
    - name: residualsSavedToDataType
      title: Residuals type
      type: List
      options:
        - { name: raw,      title: Raw          }
        - { name: standard, title: Standardized }
        - { name: student,  title: Studentized  }
      default: raw
    - { name: predictionsSavedToData,       title: Append predictions to data, type: Bool,   default: false }
    - { name: predictionsSavedToDataColumn, title: Column name,                type: String, default: 'predictions' }
    - { name: residsOV,  title: Residuals,       type: Output }
    - { name: predictOV, title: Predicted values, type: Output }
...
